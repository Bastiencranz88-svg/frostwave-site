<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FrostWave</title>

<style>
:root{
  --bg:#f7f9ff;
  --card:white;
  --text:#111;
  --nav:white;
  --border:#ddd;
  --btn:#4aa3ff;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f0f14;
    --card:#1a1a25;
    --text:white;
    --nav:#161621;
    --border:#333;
  }
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

nav{
  background:var(--nav);
  padding:15px;
}

nav a{
  margin:0 10px;
  text-decoration:none;
  color:var(--text);
  font-weight:bold;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  width:80%;
  margin:60px auto;
  padding:40px;
  border-radius:16px;
}

button{
  background:var(--btn);
  border:none;
  padding:12px 18px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Accueil</a>
<a href="beats.html">Beats</a>
<a href="kits.html">Kits</a>
<a href="contact.html">Contact</a>
<a href="panier.html">Panier</a>
</nav>

<div class="card">
<h1>🎧 FrostWave</h1>
<p>Beats exclusifs pour artistes</p>
<button onclick="location.href='beats.html'">🔥 Voir les beats</button>
</div>

</body>
</html>
