<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panier</title>

<style>
:root{
  --bg:#f7f9ff;
  --card:white;
  --text:#111;
  --border:#ddd;
  --btn:#4aa3ff;
}

@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f0f14;
    --card:#1a1a25;
    --text:white;
    --border:#333;
  }
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

nav{
  background:var(--nav);
  padding:15px;
}

nav a{
  margin:0 10px;
  color:var(--text);
  text-decoration:none;
  font-weight:bold;
}

.card{
  width:420px;
  margin:30px auto;
  padding:20px;
  border-radius:16px;
  background:var(--card);
  text-align:left;
  border:1px solid var(--border);
}

.item{
  padding:10px 0;
  border-bottom:1px dashed var(--border);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:var(--btn);
  color:white;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Accueil</a>
<a href="beats.html">Beats</a>
<a href="kits.html">Kits</a>
<a href="contact.html">Contact</a>
<a href="panier.html">Panier</a>
</nav>

<h1>🛒 Panier</h1>

<div class="card" id="cart"></div>

<script>
function load(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let c=document.getElementById("cart");
c.innerHTML="";
let total=0;

cart.forEach((i,index)=>{
total+=i.price;
c.innerHTML+=`
<div class="item">
🎧 ${i.name}<br>
💰 ${i.price}€
<br>
<button onclick="remove(${index})">❌ Retirer</button>
</div>`;
});

c.innerHTML+=`<h2>Total: ${total}€</h2>`;
c.innerHTML+=`<button onclick="pay(${total})">💳 Payer</button>`;
}

function remove(i){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
load();
}

function pay(total){
window.location.href="https://paypal.me/FrostWav/"+total;
}

load();
</script>

</body>
</html>
