<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Beats - FrostWave</title>

  <style>
    body { font-family: Arial; margin: 0; background: #f7f9ff; color: #111; }
    nav { background: white; padding: 15px; border-bottom: 1px solid #ddd; text-align:center; }
    nav a { margin: 0 10px; text-decoration: none; color: #111; font-weight: bold; }
    nav a:hover { color: #4aa3ff; }
    .card { background:white; border:1px solid #ddd; border-radius:16px; padding:18px; width:340px; margin:20px auto; }
    button { padding:10px 15px; border:none; border-radius:8px; background:#111; color:white; cursor:pointer; }
    button:hover { transform:scale(1.05); }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Accueil</a>
  <a href="beats.html">Beats</a>
  <a href="kits.html">Kits</a>
  <a href="contact.html">Contact</a>
  <a href="panier.html">Panier</a>
</nav>

<h1 style="text-align:center;">🎧 Beats</h1>

<div class="card">
  <h2>138 BPM - King</h2>
  <audio controls>
    <source src="frostwave-138bpm-king.mp3">
  </audio>
  <br><br>
  <button onclick="addToCart('FrostWave - 138 BPM - King')">
  Ajouter au panier
</button>
</div>

<div class="card">
  <h2>154 BPM - Glory</h2>
  <audio controls>
    <source src="frostwave-154bpm-glory.mp3">
  </audio>
  <br><br>
  <button onclick="addToCart('FrostWave - 154 BPM - Glory')">
  Ajouter au panier
</button>
</div>
<script>
function addToCart(item) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Ajouté au panier 🛒");
}
</script>
</body>
</html>
